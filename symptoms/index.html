<!DOCTYPE html>
<html lang="zh" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SinoMed 症状气机推导 · Symptom Qi-Dynamic Reasoning</title>
<meta name="description" content="SinoMed 症状气机推导模块：以气机升降出入为框架的症状推导系统 | Symptom reasoning through the qi-dynamic framework">
<meta name="theme-color" content="#1f5c61">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%231f5c61'/%3E%3Cg stroke='%23fff' stroke-width='4.5' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 42 V23 M21 23 l-6.5 7.5 M21 23 l6.5 7.5'/%3E%3Cpath d='M43 22 V41 M43 41 l-6.5 -7.5 M43 41 l6.5 -7.5'/%3E%3C/g%3E%3C/svg%3E">
<style>
:root{
  --pri:#1f5c61;        /* 黛青 · 主色（首页入口卡边线同此） */
  --pri-deep:#123c40;
  --pri-soft:#e7f0ef;
  --pri-line:#c9dbd9;
  --ink:#232f31;
  --ink-soft:#5a6b6d;
  --bg:#f5f8f7;
  --card:#ffffff;
  --sand:#f3ede2;       /* 暖沙 · 经文引文底 */
  --sand-line:#e0d5bf;
  --shi:#a8592f;        /* 实 · 赭 */
  --xu:#48699c;         /* 虚 · 青蓝 */
  --mix:#7a6f4e;        /* 夹杂 · 苍金 */
  --back:#7a4a2b;       /* 平台悬浮返回钮规范色 */
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.75;font-size:16px}
h1,h2,.cite,.tagline,.bb-line,.tp-line{font-family:Georgia,"Songti SC","Noto Serif SC","STSong",serif}
a{color:var(--pri);text-decoration:none}

/* 顶栏（平台规范） */
header{position:sticky;top:0;z-index:100;background:var(--pri);color:#fff;display:flex;align-items:center;gap:10px;padding:11px 16px;box-shadow:0 1px 6px rgba(18,60,64,.25)}
.hhome{color:#eaf6f8;text-decoration:none;font-size:12.5px;font-weight:700;white-space:nowrap;border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:5px 12px;line-height:1;transition:background .12s,border-color .12s}
.hhome:hover{background:rgba(255,255,255,.14);border-color:#fff}
.hb{font-weight:700;letter-spacing:.5px;font-size:16px}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
#langBtn{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.45);color:#fff;border-radius:999px;padding:4px 13px;cursor:pointer;font-size:12.5px;font-family:inherit}
#langBtn:hover{background:rgba(255,255,255,.26)}
@media (max-width:520px){header{gap:8px;padding:10px 12px}.hb{font-size:14.5px}}

#app{max-width:860px;margin:0 auto;padding:20px 16px 80px}

/* 首页 */
.hero{padding:26px 4px 8px}
.hero h1{font-size:26px;color:var(--pri-deep);letter-spacing:1px}
.tagline{margin-top:8px;color:var(--ink-soft);font-size:16px}
.searchbox{position:relative;margin:18px 0 6px}
#q{width:100%;padding:12px 16px;font-size:16px;border:1.5px solid var(--pri-line);border-radius:var(--radius);background:var(--card);color:var(--ink)}
#q:focus{outline:none;border-color:var(--pri)}
.qres{display:none;position:absolute;left:0;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--pri-line);border-radius:var(--radius);box-shadow:0 8px 28px rgba(18,60,64,.14);z-index:60;max-height:60vh;overflow:auto}
.qres.open{display:block}
.qr-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--pri-soft)}
.qr-item b{font-weight:600}
.qr-item.qr-off{color:var(--ink-soft)}
.qr-item.qr-off i,.chip-planned i{font-style:normal;font-size:11px;background:var(--pri-soft);color:var(--ink-soft);border-radius:6px;padding:1px 6px;margin-left:6px}
.qr-ft span{font-size:12px;color:var(--ink-soft)}
.qr-alias{padding:10px 14px;border-bottom:1px solid var(--pri-soft);background:var(--pri-soft)}
.qr-alias-h{font-size:12px;color:var(--pri-deep);font-weight:700;margin-bottom:4px}
.qr-none{padding:14px;color:var(--ink-soft)}

section h2{font-size:19px;color:var(--pri-deep);margin:26px 0 10px}
.hint{font-size:13px;color:var(--ink-soft);margin-top:6px}

/* 气机总图 */
.blocks{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:10px}
.block{background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:14px 8px;text-align:center;transition:border-color .15s}
.block:hover{border-color:var(--pri)}
.block-zh{display:block;font-size:20px;font-weight:700;color:var(--pri-deep);font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.block-n{display:inline-block;margin-top:6px;font-size:12px;color:#fff;background:var(--pri);border-radius:10px;padding:0 8px}

/* 十纲 */
.cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.cat{background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:12px 14px;display:block}
.cat-on:hover{border-color:var(--pri)}
.cat-off{opacity:.55}
.cat-nm{display:block;font-weight:600}
.cat-ct{display:block;font-size:12px;color:var(--ink-soft);margin-top:2px}

/* 症状卡列表 */
.symcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:10px}
.symcard{background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:14px 16px;transition:border-color .15s,transform .15s}
.symcard:hover{border-color:var(--pri);transform:translateY(-2px)}
.symcard-nm{font-size:18px;font-weight:700;color:var(--pri-deep)}
.symcard-sub{font-size:12px;color:var(--ink-soft);margin:2px 0 8px}
.symcard-dirs{display:flex;flex-wrap:wrap;gap:6px}
.mini{font-size:12px;border-radius:8px;padding:2px 8px;background:var(--pri-soft);color:var(--ink)}
.mini.xs-shi{box-shadow:inset 3px 0 0 var(--shi)}
.mini.xs-xu{box-shadow:inset 3px 0 0 var(--xu)}
.mini.xs-mix{box-shadow:inset 3px 0 0 var(--mix)}

/* 推导器预告 */
.deriver{margin-top:28px;background:linear-gradient(135deg,var(--pri-deep),var(--pri));color:#eaf4f3;border-radius:var(--radius);padding:18px 20px}
.deriver h2{color:#fff;margin:0 0 6px}
.deriver p{font-size:14px;color:#cfe3e1}


/* 自测入口卡 */
.learn{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:26px}
.learn-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:14px 16px;transition:border-color .15s,transform .15s}
.learn-card:hover{border-color:var(--pri);transform:translateY(-2px)}
.lc-ico{flex:0 0 38px;height:38px;border-radius:50%;background:var(--pri-soft);color:var(--pri-deep);display:flex;align-items:center;justify-content:center;font-size:18px}
.lc-b{flex:1;display:block}
.lc-b b{display:block;color:var(--pri-deep);font-size:16px}
.lc-b i{display:block;font-style:normal;font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.5}
.lc-go{color:var(--pri);font-size:18px}

/* 测验 / 闪卡 */
.quizsec h1{font-size:22px;color:var(--pri-deep);margin-bottom:6px}
.q-prog{font-size:12px;color:var(--ink-soft);margin:18px 0 8px;letter-spacing:.5px}
.q-stem{background:var(--card);border:1.5px solid var(--pri-line);border-left:5px solid var(--pri);border-radius:var(--radius);padding:14px 16px}
.q-stem-h{font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 8px;display:inline-block}
.q-sym{font-size:22px;font-weight:700;color:var(--pri-deep);margin:8px 0 6px;font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.q-line{font-size:14.5px;margin-top:3px}
.q-line b{display:inline-block;font-size:11px;color:#fff;background:#5f8b87;border-radius:6px;padding:0 6px;margin-right:7px;font-weight:400;vertical-align:1px}
.q-stem.q3{border-left-color:var(--shi)}
.q-stem-h.q3h{background:var(--shi)}
.q-step{margin-top:16px}
.q-step-h{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--pri-deep);font-size:15px}
.q-step-h span{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--pri);color:#fff;font-size:12px}
.q-opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.q-opts-v{flex-direction:column}
.q-opt{text-align:left;background:var(--card);border:1.5px solid var(--pri-line);border-radius:10px;padding:10px 14px;font-size:14.5px;font-family:inherit;color:var(--ink);cursor:pointer;transition:border-color .12s,background .12s}
.q-opt:hover{border-color:var(--pri);background:var(--pri-soft)}
.q-fb{margin-top:10px;border-radius:10px;padding:9px 13px;font-size:14.5px}
.q-fb.ok{background:#e7f0ef;border:1px solid var(--pri-line);color:var(--pri-deep)}
.q-fb.no{background:#f6ece6;border:1px solid #e2c9b8;color:#8a4520}
.q-chain{margin-top:18px;background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:14px 16px}
.q-chain-h{font-weight:700;color:var(--pri-deep);margin-bottom:8px}
.q-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.q-open{display:inline-block;margin-top:10px;font-size:14px}
.q-acts{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.q-btn{background:var(--pri);color:#fff;border:1.5px solid var(--pri);border-radius:999px;padding:9px 22px;font-size:14.5px;font-family:inherit;cursor:pointer}
.q-btn:hover{background:var(--pri-deep);border-color:var(--pri-deep)}
.q-btn.ghost{background:transparent;color:var(--pri-deep)}
.q-btn.ghost:hover{background:var(--pri-soft)}
.q-result{margin-top:18px;background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:20px}
.q-score{font-size:40px;font-weight:700;color:var(--pri-deep);font-family:Georgia,serif;line-height:1}
.q-score span{font-size:18px;color:var(--ink-soft);font-weight:400}
.q-msg{margin-top:8px;color:var(--ink-soft)}
.q-rev-h{margin-top:16px;font-size:12px;color:#fff;background:var(--shi);border-radius:6px;padding:1px 9px;display:inline-block}
.q-rev{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;border-bottom:1px solid var(--pri-soft);padding:8px 0;font-size:14px;color:var(--ink-soft)}
.q-rev b{color:var(--pri-deep)}
.card-face{margin-top:10px;background:var(--card);border:1.5px solid var(--pri);border-radius:var(--radius);padding:18px 18px 20px}
.cf-h{font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 8px;display:inline-block}
.cf-q{font-size:19px;font-weight:700;color:var(--pri-deep);margin-top:10px;line-height:1.6;font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.cf-body{margin-top:14px;border-top:1px dashed var(--pri-line);padding-top:12px;display:grid;gap:8px}

/* 舌脉验证校准工具 */
.smsec h1{font-size:22px;color:var(--pri-deep);margin-bottom:10px}
.sm-intro{background:var(--card);border:1px solid var(--pri-line);border-radius:var(--radius);padding:14px 16px}
.sm-line{margin-top:12px;background:linear-gradient(135deg,var(--pri-deep),var(--pri));color:#eaf4f3;border-radius:var(--radius);padding:14px 18px;font-size:15.5px;line-height:1.8;font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.sm-g{margin-top:26px}
.sm-g h2{font-size:19px;color:var(--pri-deep);border-bottom:2px solid var(--pri-line);padding-bottom:6px}
.sm-key{margin-top:10px;background:var(--sand);border:1px solid var(--sand-line);border-radius:10px;padding:11px 14px;font-size:16px;color:#4a4232;font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.sm-key span{display:inline-block;font-size:11px;color:#8a7a56;border:1px solid var(--sand-line);border-radius:6px;padding:0 7px;margin-right:9px;vertical-align:2px;font-family:-apple-system,sans-serif}
.sm-item{background:var(--card);border:1.5px solid var(--pri-line);border-left:5px solid var(--pri);border-radius:var(--radius);padding:13px 16px;margin-top:12px}
.sm-feat{font-size:19px;font-weight:700;color:var(--pri-deep);font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.sm-mean{margin-top:3px;font-size:15px;color:var(--ink)}
.sm-tags{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:9px}
.sm-seen{font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 8px}
.sm-note{margin-top:10px;padding-top:9px;border-top:1px dashed var(--pri-line);font-size:14.5px;color:var(--ink-soft);line-height:1.8}

/* 症状卡内的脉症相悖提示 */
.cav{margin-top:14px;background:#fdf6f1;border:1.5px solid #e2c9b8;border-left:5px solid var(--shi);border-radius:var(--radius);padding:13px 16px}
.cav-h{font-weight:700;color:#8a4520;font-size:15px}
.cav-r{margin-top:7px;font-size:14.5px;line-height:1.8}
.cav-r span{display:inline-block;font-size:11px;color:#fff;background:#b0724a;border-radius:6px;padding:1px 8px;margin-right:8px;vertical-align:1px}
.cav-r span.k{background:var(--shi)}
.cav-v{margin-top:10px;padding-top:9px;border-top:1px dashed #e2c9b8;font-size:14.5px;line-height:1.85;color:#5c4130}
.cav-go{display:inline-block;margin-top:9px;font-size:13.5px;color:#8a4520;border-bottom:1px solid #e2c9b8}

/* 脉症从舍 */
.cs-h{font-size:17px;color:var(--pri-deep);margin:24px 0 8px;padding-left:11px;border-left:4px solid var(--pri)}
.cs-branches{display:grid;gap:10px}
.cs-br{display:flex;gap:12px;background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:13px 15px}
.cs-br-n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.cs-br-c{font-weight:700;color:var(--pri-deep)}
.cs-br-a{margin-top:3px;color:var(--shi);font-weight:600;font-size:14.5px}
.cs-br-note{margin-top:7px;font-size:14px;color:var(--ink-soft);line-height:1.8}
.cs-lv{margin-top:12px;border-radius:var(--radius);padding:12px 15px;border:1.5px solid var(--pri-line);background:var(--card)}
.cs-lv.g1{border-left:6px solid var(--shi)}
.cs-lv.g2{border-left:6px solid var(--mix)}
.cs-lv.g3{border-left:6px solid #9db6b3;opacity:.92}
.cs-lv-h{font-weight:700;color:var(--pri-deep);margin-bottom:6px}
.cs-lv-i{border-top:1px dashed var(--pri-line);padding:9px 0 2px}
.cs-lv-i:first-of-type{border-top:0}
.cs-lv-n{font-weight:600}
.cs-dec{display:inline-block;font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 8px;margin-left:8px;font-weight:400;vertical-align:2px}
.cs-lv-r{font-size:14.5px;color:var(--ink-soft);margin-top:3px;line-height:1.8}
.cs-case{margin-top:14px;background:var(--card);border:1.5px solid var(--pri-line);border-left:5px solid var(--pri);border-radius:var(--radius);padding:14px 16px}
.cs-case-n{font-size:18px;font-weight:700;color:var(--pri-deep);font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.cs-show{margin-top:8px;background:var(--pri-soft);border-radius:9px;padding:9px 12px;font-size:14.5px}
.cs-show span,.cs-rule span{display:inline-block;font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 8px;margin-right:8px;vertical-align:1px}
.cs-truth-h{margin-top:12px;font-size:12px;color:#fff;background:#5f8b87;border-radius:6px;padding:1px 9px;display:inline-block}
.cs-rule{margin-top:11px;border-top:1px dashed var(--pri-line);padding-top:10px;font-size:14.5px;line-height:1.85}
.cs-rule span{background:var(--shi)}
.cs-bl{background:var(--card);border:1px solid var(--pri-line);border-radius:10px;padding:10px 13px;margin-top:9px;font-size:14.5px;line-height:1.8;color:var(--ink-soft)}
.cs-bl b{display:block;color:var(--pri-deep);margin-bottom:2px}
.cs-noise{display:grid;gap:9px}
.cs-nz{background:var(--sand);border:1px solid var(--sand-line);border-radius:10px;padding:10px 13px;font-size:14px;line-height:1.85;color:#4a4232}
.cs-nz span{display:inline-block;font-size:11px;color:#8a7a56;border:1px solid var(--sand-line);border-radius:6px;padding:0 7px;margin-right:8px;vertical-align:1px;font-family:-apple-system,sans-serif}
.cs-self{margin-top:20px;background:linear-gradient(135deg,var(--pri-deep),var(--pri));color:#eaf4f3;border-radius:var(--radius);padding:16px 18px;font-size:15px;line-height:1.9}
.cs-self-h{font-weight:700;color:#fff;margin-bottom:6px;font-size:16px}

/* 全站统一页脚 */
.site-foot{border-top:1px solid var(--pri-line);margin-top:40px;padding:22px 16px 32px;text-align:center;font-size:12.5px;color:var(--ink-soft);line-height:1.9}
.site-foot a{color:var(--pri-deep);text-decoration:none;border-bottom:1px solid var(--pri-line)}
.site-foot a:hover{border-bottom-color:var(--pri)}
.sf-links{margin-top:4px}
.sf-ent{margin-top:4px;font-size:11.5px;opacity:.8}

/* 详情 */
.backlink{display:inline-block;margin:4px 0 12px;font-size:14px}
.detail .d-head{background:linear-gradient(135deg,var(--pri-deep),var(--pri));border-radius:var(--radius);padding:16px 18px;box-shadow:0 2px 10px rgba(18,60,64,.18)}
.detail .d-head h1{font-size:28px;color:#fff;letter-spacing:1px}
.aka{font-size:13px;color:#cfe3e1;margin-top:5px}
/* 吸顶分段锚点条 */
.secnav{position:sticky;top:47px;z-index:80;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(245,248,247,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--pri-line);margin:10px -16px 0;padding:8px 16px;scrollbar-width:none}
.secnav::-webkit-scrollbar{display:none}
.snav{display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;font-size:13.5px;border:1px solid var(--pri-line);background:var(--card);color:var(--ink-soft);border-radius:20px;padding:5px 13px 5px 6px;white-space:nowrap;transition:background .15s,color .15s,border-color .15s}
.snav-n{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:var(--pri-soft);color:var(--pri-deep);font-size:11px;font-weight:700}
.snav.on{background:var(--pri);border-color:var(--pri);color:#fff}
.snav.on .snav-n{background:rgba(255,255,255,.24);color:#fff}
.snav:hover{border-color:var(--pri)}
.sec{scroll-margin-top:96px}

.sec{margin-top:24px}
.sec h2{display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--pri-line);padding-bottom:6px}
.sec-n{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--pri);color:#fff;font-size:14px;font-family:inherit}
.what{background:var(--card);border:1px solid var(--pri-line);border-radius:var(--radius);padding:14px 16px}

/* 方向卡 + 推导链（signature） */
.dir{background:var(--card);border:1.5px solid var(--pri-line);border-left:5px solid var(--pri);border-radius:var(--radius);padding:14px 16px;margin-top:14px}
.dir-head{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.dir-label{font-weight:700;font-size:17px;color:var(--pri-deep)}
.wbadge{font-size:12px;border-radius:8px;padding:2px 9px;color:#fff;white-space:nowrap}
.wbadge.w3{background:var(--pri)}
.wbadge.w2{background:#5f8b87}
.wbadge.w1{background:#9db6b3}
.xsbadge{font-size:12px;border-radius:8px;padding:2px 9px;color:#fff;white-space:nowrap}
.xsbadge.xs-shi{background:var(--shi)}

  "xiezhang": {
    id: "xiezhang", cat: "xiongxie",

    what: {
      zh: "胁肋部胀满不适，或兼疼痛。胁为肝胆经脉所过、肝之分野。肝主疏泄、喜条达，其气以柔和舒展为顺。故胁胀几乎专候肝胆：气郁则胀（无形之滞），血瘀则刺痛（有形之阻），湿热则胀痛而重（邪蕴其间），阴虚则隐痛绵绵（络失濡养）。胀多痛少者气分为主，痛甚于胀者血分或有形之邪。",
      en: "Distended discomfort in the flanks and ribs, sometimes with pain. The flanks are traversed by the liver and gallbladder channels and are the liver's domain. The liver governs free coursing and loves unimpeded spreading; its qi is normal when soft and extended. So hypochondriac distension is almost a dedicated reading of the liver and gallbladder: qi constraint distends (a formless stagnation), blood stasis stabs (a substantial obstruction), damp-heat distends and pains with heaviness (an evil smoldering within), yin deficiency aches faintly on and on (the vessels losing their moistening). Distension outweighing pain points to the qi aspect; pain outweighing distension points to the blood aspect or a substantial pathogen."
    },
    dirs: [
      {
        id: "d1",

  /* ---------- 搜索 ---------- */
  function doSearch(q) {
    q = q.trim();
    var box = document.getElementById("qres");
    if (!box) return;
    if (!q) { box.innerHTML = ""; box.classList.remove("open"); return; }
    var lq = q.toLowerCase();
    var h = "";
    var found = false;

    /* 证型别名 */
    ALIASES.forEach(function (a) {
      if (a.zh.indexOf(q) >= 0 || a.en.toLowerCase().indexOf(lq) >= 0) {
        found = true;
        h += '<div class="qr-alias"><div class="qr-alias-h">' + esc(t("alias_hit")) + '</div>';
        h += '<div class="qr-alias-b"><b>' + esc(getLang() === "zh" ? a.zh : a.en) + '</b> ' + esc(t("alias_lead")) + ' ';
        a.tags.forEach(function (tg) { h += tagChip(tg); });
        h += '</div></div>';
      }
    });

    /* 症状名（含未上线，未上线者显示徽标） */
    ROSTER.forEach(function (r) {
      var s = SYMPTOMS[r.id];
      var akaHit = false;
      if (s && s.aka) {
        (s.aka.zh || []).forEach(function (x) { if (x.indexOf(q) >= 0) akaHit = true; });
        (s.aka.en || []).forEach(function (x) { if (x.toLowerCase().indexOf(lq) >= 0) akaHit = true; });
      }
      if (r.zh.indexOf(q) >= 0 || r.en.toLowerCase().indexOf(lq) >= 0 || r.id.indexOf(lq) >= 0 || akaHit) {
        found = true;
        if (r.built) {
          h += '<a class="qr-item" href="#sym-' + esc(r.id) + '"><b>' + esc(symName(r.id)) + '</b></a>';
        } else {
          h += '<div class="qr-item qr-off"><b>' + esc(symName(r.id)) + '</b>' + (BUILD_MODE ? '<i>' + esc(t("planned_badge")) + '</i>' : '') + '</div>';
        }
      }
    });

    /* 全文（推导链、内涵段） */
    var ftHits = [];
    Object.keys(SYMPTOMS).forEach(function (k) {
      var s = SYMPTOMS[k];
      var blob = pick(s.what);
      s.dirs.forEach(function (d) {
        blob += " " + pick(d.label);
        d.chain.forEach(function (st) { blob += " " + pick(st); });
      });
      if (blob.toLowerCase().indexOf(lq) >= 0 && !(s.name.zh.indexOf(q) >= 0 || s.name.en.toLowerCase().indexOf(lq) >= 0)) {
        ftHits.push(s);
      }
    });
    ftHits.forEach(function (s) {
      found = true;
      h += '<a class="qr-item qr-ft" href="#sym-' + esc(s.id) + '"><b>' + esc(pick(s.name)) + '</b><span>…' + esc(getLang() === "zh" ? "全文命中" : "full-text match") + '</span></a>';
    });

    if (!found) h = '<div class="qr-none">' + esc(t("noresult")) + '</div>';
    box.innerHTML = h;
    box.classList.add("open");
  }

  /* ---------- 吸顶锚点条：点击平滑定位 + 滚动高亮 ---------- */
  var navObserver = null;
  function wireSecNav() {
    if (navObserver) { navObserver.disconnect(); navObserver = null; }
    var nav = document.getElementById("secnav");
    if (!nav) return;
    var links = [].slice.call(nav.querySelectorAll(".snav"));
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    links.forEach(function (a) {
      a.addEventListener("click", function (e) {
        e.preventDefault();
        var el = document.getElementById(a.getAttribute("data-sec"));
        if (!el) return;
        if (el.scrollIntoView) el.scrollIntoView({ behavior: reduce ? "auto" : "smooth", block: "start" });
        setActive(a.getAttribute("data-sec"));
      });
    });

    function setActive(id) {
      links.forEach(function (a) {
        if (a.getAttribute("data-sec") === id) a.classList.add("on");
        else a.classList.remove("on");
      });
    }
    setActive(links.length ? links[0].getAttribute("data-sec") : "");

    if (typeof IntersectionObserver === "function") {
      navObserver = new IntersectionObserver(function (entries) {
        var best = null;
        entries.forEach(function (en) {
          if (en.isIntersecting && (!best || en.boundingClientRect.top < best.boundingClientRect.top)) best = en;
        });
        if (best) setActive(best.target.id);
      }, { rootMargin: "-96px 0px -60% 0px", threshold: 0 });
      links.forEach(function (a) {
        var el = document.getElementById(a.getAttribute("data-sec"));
        if (el) navObserver.observe(el);
      });
    }
  }

  /* ============================================================
     气机盲推 · 自测（题目从现有方向数据实时生成，不另建题库）
     每题两步：①判虚实（鉴别第一开关）②推气机方向；答后回放完整推导链
     ============================================================ */
  var QUIZ = null;

  function shuffle(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function allDirs() {
    var out = [];
    Object.keys(SYMPTOMS).forEach(function (k) {
      SYMPTOMS[k].dirs.forEach(function (d) { out.push({ sym: SYMPTOMS[k], dir: d }); });
    });
    return out;
  }

  function g1Names() {
    var lv = CONGSHE.levels[0];
    return lv.items.map(function (i) { return pick(i.name); });
  }

  function buildType3(n) {
    var pool = allDirs().filter(function (x) { return x.dir.tp_caveat; });
    shuffle(pool);
    return pool.slice(0, n).map(function (x) {
      var c = x.dir.tp_caveat;
      /* 第一步：四分支归属 */
      var br = [];
      CONGSHE.branches.slice(1).forEach(function (b) { br.push(pick(b.act)); });
      /* 第二步：甲级硬指标 */
      var names = g1Names();
      var right = pick(c.key_name);
      var opts = names.filter(function (nm) { return nm !== right; });
      shuffle(opts);
      opts = opts.slice(0, 3);
      opts.push(right);
      return { type: 3, sym: x.sym, dir: x.dir, cav: c, br: shuffle(br.slice()), opts: shuffle(opts), a1: null, a2: null };
    });
  }

  function branchAnswer(c) {
    var b = pick(c.branch);
    if (/舍脉从症|Follow the symptoms/.test(b)) return pick(CONGSHE.branches[2].act);
    if (/各说各话|speaking separately/.test(b)) return pick(CONGSHE.branches[1].act);
    return pick(CONGSHE.branches[3].act);
  }

  function buildQuiz(n) {
    var pool = allDirs().filter(function (x) { return x.sym.dirs.length >= 2; });
    shuffle(pool);
    var n3 = Math.min(Math.max(1, Math.round(n * 0.3)), allDirs().filter(function (x) { return x.dir.tp_caveat; }).length);
    var items = pool.slice(0, Math.max(0, n - n3)).map(function (x) {
      /* 干扰项：先取同一症状的其他方向，不足再从全库补 */
      var opts = x.sym.dirs.filter(function (d) { return d.id !== x.dir.id; })
                           .map(function (d) { return pick(d.label); });
      if (opts.length < 3) {
        var extra = allDirs().filter(function (y) { return y.sym.id !== x.sym.id; });
        shuffle(extra);
        for (var i = 0; i < extra.length && opts.length < 3; i++) {
          var lb = pick(extra[i].dir.label);
          if (opts.indexOf(lb) < 0) opts.push(lb);
        }
      }
      opts = opts.slice(0, 3);
      opts.push(pick(x.dir.label));
      return { type: 1, sym: x.sym, dir: x.dir, opts: shuffle(opts), a1: null, a2: null };
    });
    items = shuffle(items.concat(buildType3(n3)));
    QUIZ = { items: items, idx: 0, step: 1, score: 0, total: items.length * 2 };
  }

  function quizAnswer(step, val) {
    if (!QUIZ) return;
    var it = QUIZ.items[QUIZ.idx];
    if (step === 1) {
      it.a1 = val;
      if (val === (it.type === 3 ? branchAnswer(it.cav) : it.dir.xushi)) QUIZ.score++;
      QUIZ.step = 2;
    } else {
      it.a2 = val;
      if (val === (it.type === 3 ? pick(it.cav.key_name) : pick(it.dir.label))) QUIZ.score++;
      QUIZ.step = 3;
    }
    paintQuiz();
  }

  function quizNext() {
    if (!QUIZ) return;
    if (QUIZ.idx < QUIZ.items.length - 1) { QUIZ.idx++; QUIZ.step = 1; paintQuiz(); }
    else { QUIZ.step = 4; paintQuiz(); }
  }

  function quizStemHtml(it) {
    var h = '<div class="q-stem"><div class="q-stem-h">' + esc(t("q_stem")) + '</div>';
    h += '<div class="q-sym">' + esc(pick(it.sym.name)) + '</div>';

  }


  function paintQuiz3(it, h) {
    var box = document.getElementById("quizbox");
    var c = it.cav;
    h += '<div class="q-stem q3"><div class="q-stem-h q3h">' + esc(t("q3_h")) + '</div>';
    h += '<div class="q-sym">' + esc(pick(it.sym.name)) + '</div>';
    h += '<div class="q-line"><b>' + esc(t("cav_look")) + '</b>' + esc(pick(c.look)) + '</div>';
    h += '<div class="q-line"><b>' + esc(t("cav_clash")) + '</b>' + esc(pick(c.clash)) + '</div></div>';

    h += '<div class="q-step"><div class="q-step-h"><span>1</span>' + esc(t("q3_step1")) + '</div>';
    if (QUIZ.step === 1) {
      h += '<div class="q-opts q-opts-v">';
      it.br.forEach(function (b) { h += '<button class="q-opt" data-q="a1" data-v="' + esc(b) + '">' + esc(b) + '</button>'; });
      h += '</div>';
    } else {
      var right1 = branchAnswer(c), ok1 = it.a1 === right1;
      h += '<div class="q-fb ' + (ok1 ? "ok" : "no") + '">' + esc(ok1 ? t("q_right") : t("q_wrong")) +
           ' · ' + esc(t("q_correct_is")) + '：<b>' + esc(right1) + '</b></div>';
    }
    h += '</div>';

    if (QUIZ.step >= 2) {
      h += '<div class="q-step"><div class="q-step-h"><span>2</span>' + esc(t("q3_step2")) + '</div>';
      if (QUIZ.step === 2) {
        h += '<div class="q-opts q-opts-v">';
        it.opts.forEach(function (o) { h += '<button class="q-opt" data-q="a2" data-v="' + esc(o) + '">' + esc(o) + '</button>'; });
        h += '</div>';
      } else {
        var right2 = pick(c.key_name), ok2 = it.a2 === right2;
        h += '<div class="q-fb ' + (ok2 ? "ok" : "no") + '">' + esc(ok2 ? t("q_right") : t("q_wrong")) +
             ' · ' + esc(t("q_correct_is")) + '：<b>' + esc(right2) + '</b></div>';
      }
      h += '</div>';
    }

    if (QUIZ.step === 3) {
      h += '<div class="q-chain"><div class="q-chain-h">' + esc(t("cs_truth")) + '</div>';
      h += '<div class="cav-v">' + esc(pick(c.verdict)) + '</div>';
      if (c.case_id) {
        var cs = null;
        CONGSHE.cases.forEach(function (x) { if (x.id === c.case_id) cs = x; });
        if (cs) h += '<div class="cite"><span class="cite-l">' + esc(t("cite_label")) + '</span>' + esc(pick(cs.cite)) + '</div>';
      }
      h += '<a class="q-open" href="#sym-' + esc(it.sym.id) + '">' + esc(t("q_open")) + ' →</a>';
      h += '<div class="q-acts"><button class="q-btn" data-q="next">' +
           esc(QUIZ.idx < QUIZ.items.length - 1 ? t("q_next") : t("q_finish")) + '</button></div></div>';
    }
    box.innerHTML = h;
  }

  function paintQuiz() {
    var box = document.getElementById("quizbox");
    if (!box || !QUIZ) return;

    if (QUIZ.step === 4) {
      var pct = QUIZ.score / QUIZ.total;
      var msg = pct === 1 ? t("q_done_perfect") : (pct >= 0.7 ? t("q_done_good") : t("q_done_poor"));
      var h = '<div class="q-result"><div class="q-score">' + QUIZ.score + '<span>' + esc(t("q_of")) + QUIZ.total + '</span></div>';
      h += '<div class="q-msg">' + esc(msg) + '</div>';
      var missed = QUIZ.items.filter(function (x) {
        return x.type === 3
          ? (x.a1 !== branchAnswer(x.cav) || x.a2 !== pick(x.cav.key_name))
          : (x.a1 !== x.dir.xushi || x.a2 !== pick(x.dir.label));
      });
      if (missed.length) {
        h += '<div class="q-rev-h">' + esc(t("q_review")) + '</div>';
        missed.forEach(function (x) {
          h += '<a class="q-rev" href="#sym-' + esc(x.sym.id) + '"><b>' + esc(pick(x.sym.name)) + '</b>' + esc(x.type === 3 ? t("q3_h") + "：" + pick(x.cav.key_name) : pick(x.dir.label)) + '</a>';
        });
      }
      h += '<div class="q-acts"><button class="q-btn" data-q="restart">' + esc(t("q_restart")) + '</button></div></div>';
      box.innerHTML = h;
      return;
    }

    var it = QUIZ.items[QUIZ.idx];
    var h = '<div class="q-prog">' + esc(t("q_progress")) + ' ' + (QUIZ.idx + 1) + esc(t("q_progress2")) + ' / ' + QUIZ.items.length + '</div>';

    if (it.type === 3) { paintQuiz3(it, h); return; }
    h += quizStemHtml(it);

    /* 第一步 */
    h += '<div class="q-step"><div class="q-step-h"><span>1</span>' + esc(t("q_step1")) + '</div>';
    if (QUIZ.step === 1) {
      h += '<div class="q-opts">';
      VOCAB.xushi.forEach(function (x) {
        h += '<button class="q-opt" data-q="a1" data-v="' + esc(x) + '">' + esc(xsName(x)) + '</button>';
      });
      h += '</div>';
    } else {
      var ok1 = it.a1 === it.dir.xushi;
      h += '<div class="q-fb ' + (ok1 ? "ok" : "no") + '">' + esc(ok1 ? t("q_right") : t("q_wrong")) +
           ' · ' + esc(t("q_correct_is")) + '：<b>' + esc(xsName(it.dir.xushi)) + '</b></div>';
    }
    h += '</div>';

    /* 第二步 */
    if (QUIZ.step >= 2) {
      h += '<div class="q-step"><div class="q-step-h"><span>2</span>' + esc(t("q_step2")) + '</div>';
      if (QUIZ.step === 2) {
        h += '<div class="q-opts q-opts-v">';
        it.opts.forEach(function (o) {
          h += '<button class="q-opt" data-q="a2" data-v="' + esc(o) + '">' + esc(o) + '</button>';
        });
        h += '</div>';
      } else {
        var ok2 = it.a2 === pick(it.dir.label);
        h += '<div class="q-fb ' + (ok2 ? "ok" : "no") + '">' + esc(ok2 ? t("q_right") : t("q_wrong")) +
             ' · ' + esc(t("q_correct_is")) + '：<b>' + esc(pick(it.dir.label)) + '</b></div>';
      }
      h += '</div>';
    }

    /* 答完回放推导链 */
    if (QUIZ.step === 3) {
      h += '<div class="q-chain"><div class="q-chain-h">' + esc(t("q_chain")) + '</div><div class="q-tags">';
      it.dir.tags.forEach(function (tg) { h += '<span class="chip chip-tag">' + esc(tagName(tg)) + '</span>'; });
      h += '</div><div class="chain">';
      it.dir.chain.forEach(function (st, i) {
        h += '<div class="step"><div class="step-n">' + (i + 1) + '</div><div class="step-t">' + esc(pick(st)) + '</div></div>';
        if (i < it.dir.chain.length - 1) h += '<div class="step-arrow">↓</div>';
      });
      h += '</div>';
      if (it.dir.cite) h += '<div class="cite"><span class="cite-l">' + esc(t("cite_label")) + '</span>' + esc(pick(it.dir.cite)) + '</div>';
      h += '<a class="q-open" href="#sym-' + esc(it.sym.id) + '">' + esc(t("q_open")) + ' →</a>';
      h += '<div class="q-acts"><button class="q-btn" data-q="next">' +
           esc(QUIZ.idx < QUIZ.items.length - 1 ? t("q_next") : t("q_finish")) + '</button></div></div>';
    }
    box.innerHTML = h;
  }

  function renderQuiz() {
    var h = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>';
    h += '<section class="quizsec"><h1>' + esc(t("quiz_entry_t")) + '</h1><p class="hint">' + esc(t("quiz_entry_d")) + '</p>';
    h += '<div class="q-acts"><button class="q-btn" data-q="new10">' + esc(t("q_start10")) + '</button>';
    h += '<button class="q-btn ghost" data-q="new20">' + esc(t("q_start20")) + '</button></div>';
    h += '<div id="quizbox"></div></section>';
    return h;
  }

  /* ---------- 关键一问 · 闪卡 ---------- */
  var CARDS = null;

  function buildCards() {
    var list = [];
    Object.keys(SYMPTOMS).forEach(function (k) {
      var s = SYMPTOMS[k];
      if (s.bianbie && s.bianbie.key) list.push(s);
    });
    CARDS = { list: shuffle(list), idx: 0, flipped: false };
  }

  function paintCards() {
    var box = document.getElementById("cardbox");
    if (!box || !CARDS || !CARDS.list.length) return;
    var s = CARDS.list[CARDS.idx];
    var h = '<div class="q-prog">' + (CARDS.idx + 1) + ' / ' + CARDS.list.length + '</div>';
    h += '<div class="card-face"><div class="cf-h">' + esc(t("c_front")) + '</div>';
    h += '<div class="cf-q">' + esc(pick(s.bianbie.key)) + '</div>';
    if (CARDS.flipped) {
      h += '<div class="cf-body">';
      s.bianbie.rows.forEach(function (r) {
        h += '<div class="bb-row"><div class="bb-side">' + esc(pick(r.side)) + '</div><div class="bb-feats">' + esc(pick(r.feats)) + '</div></div>';
      });
      h += '<div class="bb-line">' + esc(pick(s.bianbie.line)) + '</div>';
      h += '<a class="q-open" href="#sym-' + esc(s.id) + '">' + esc(t("c_from")) + '：' + esc(pick(s.name)) + ' →</a></div>';
    }
    h += '</div><div class="q-acts">';
    h += CARDS.flipped
      ? '<button class="q-btn" data-c="next">' + esc(t("c_next")) + '</button>'
      : '<button class="q-btn" data-c="flip">' + esc(t("c_flip")) + '</button>';
    h += '</div>';
    box.innerHTML = h;
  }

  function renderCards() {
    var h = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>';
    h += '<section class="quizsec"><h1>' + esc(t("cards_entry_t")) + '</h1><p class="hint">' + esc(t("cards_entry_d")) + '</p>';
    h += '<div id="cardbox"></div></section>';
    return h;
  }

  function wireQuiz() {
    var q = document.getElementById("quizbox");
    var sec = document.querySelector(".quizsec");
    if (sec) {
      sec.addEventListener("click", function (e) {
        var b = e.target.closest ? e.target.closest("button") : null;
        if (!b) return;
        var qa = b.getAttribute("data-q"), ca = b.getAttribute("data-c");
        if (qa === "new10") { buildQuiz(10); paintQuiz(); }
        else if (qa === "new20") { buildQuiz(20); paintQuiz(); }
        else if (qa === "restart") { buildQuiz(QUIZ ? QUIZ.items.length : 10); paintQuiz(); }
        else if (qa === "a1") quizAnswer(1, b.getAttribute("data-v"));
        else if (qa === "a2") quizAnswer(2, b.getAttribute("data-v"));
        else if (qa === "next") quizNext();
        else if (ca === "flip") { CARDS.flipped = true; paintCards(); }
        else if (ca === "next") {
          CARDS.idx = (CARDS.idx + 1) % CARDS.list.length; CARDS.flipped = false; paintCards();
        }
      });
    }
    /* 切换语言会重建 DOM：已有进度则重绘，无则新建 */
    if (q) {
      if (!QUIZ) buildQuiz(10);
      else if (QUIZ.step < 4) {
        /* 选项文本随语言变，重建当前题的选项与已答记录 */
        QUIZ.items.forEach(function (it) {
          if (it.type === 3) {
            var br = [];
            CONGSHE.branches.slice(1).forEach(function (b) { br.push(pick(b.act)); });
            it.br = shuffle(br);
            var names = g1Names(), right = pick(it.cav.key_name);
            var o3 = names.filter(function (nm) { return nm !== right; });
            shuffle(o3); o3 = o3.slice(0, 3); o3.push(right);
            it.opts = shuffle(o3);
            it.a1 = null; it.a2 = null;
            return;
          }
          var opts = it.sym.dirs.filter(function (d) { return d.id !== it.dir.id; })
                                .map(function (d) { return pick(d.label); });
          while (opts.length < 3) opts.push("");
          opts = opts.slice(0, 3).filter(function (x) { return x; });
          opts.push(pick(it.dir.label));
          it.opts = opts;
        });
      }
      paintQuiz();
    }
    if (document.getElementById("cardbox")) {
      if (!CARDS) buildCards();
      paintCards();
    }
  }

  /* ---------- 全站统一页脚（年份自动，永不手改） ---------- */
  function drawFooter() {
    var start = 2026;
    var now = new Date().getFullYear();
    var years = (now > start) ? (start + "\u2013" + now) : String(start);
    var c = document.getElementById("sfCopy");
    if (c) c.textContent = "\u00A9 " + years + " SinoMed \u00B7 " + t("f_rights") + " \u00B7 sinomed.ca";
    var l = document.getElementById("sfLinks");
    if (l) {
      l.innerHTML = '<a href="../legal/index.html">' + esc(t("f_legal")) + '</a> \u00B7 ' +
                    '<a href="mailto:support@sinomed.ca">support@sinomed.ca</a>';
    }
  }

  /* ---------- 路由 ---------- */
  function render() {
    var app = document.getElementById("app");
    if (!app) return;
    var hash = decodeURIComponent(location.hash || "").replace(/^#/, "");
    var html;
    if (hash.indexOf("sym-") === 0) html = renderSym(hash.slice(4));
    else if (hash.indexOf("tag-") === 0) html = renderTag(hash.slice(4));
    else if (hash.indexOf("block-") === 0) html = renderBlock(hash.slice(6));
    else if (hash === "shemai" || hash === "cat-shemai") html = renderShemai();
    else if (hash === "quiz") html = renderQuiz();
    else if (hash === "cards") html = renderCards();
    else if (hash.indexOf("cat-") === 0) html = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>' + renderCatList(hash.slice(4), true);
    else html = renderHome();
    app.innerHTML = html;
    var q = document.getElementById("q");
    if (q) q.addEventListener("input", function () { doSearch(q.value); });
    var lb = document.getElementById("langBtn");
    if (lb) lb.textContent = t("lang_btn");
    var hb = document.getElementById("hbTitle");
    if (hb) hb.textContent = t("title");
    wireSecNav();
    wireQuiz();
    drawFloatBack();
    drawFooter();
    try { window.scrollTo(0, 0); } catch (e) {}
  }

  /* ---------- 启动 ---------- */
  function boot() {
    document.documentElement.setAttribute("data-lang", getLang());

    /* 入站 ?goto= */
    var p = new URLSearchParams(location.search);
    var g = p.get("goto");
    if (g && !location.hash) {
      var gid = g.replace(/[^a-z0-9_-]/gi, "");
      if (ROSTER_MAP[gid]) location.hash = "#sym-" + gid;
    }

    drawFloatBack();

    /* 语言切换 */
    var lb = document.getElementById("langBtn");
    if (lb) lb.addEventListener("click", function () { setLang(getLang() === "zh" ? "en" : "zh"); });

    window.addEventListener("hashchange", render);
    render();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();

})();

</script>
</body>
