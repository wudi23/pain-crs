<!DOCTYPE html>
<html lang="zh" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SinoMed 症状学 · Symptoms</title>
<meta name="description" content="SinoMed 症状学模块：以气机升降出入为框架的症状推导系统 | Symptom reasoning through the qi-dynamic framework">
<meta name="theme-color" content="#1f5c61">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%231f5c61'/%3E%3Cg stroke='%23fff' stroke-width='4.5' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 42 V23 M21 23 l-6.5 7.5 M21 23 l6.5 7.5'/%3E%3Cpath d='M43 22 V41 M43 41 l-6.5 -7.5 M43 41 l6.5 -7.5'/%3E%3C/g%3E%3C/svg%3E">
<style>
:root{
  --pri:#1f5c61;        /* 黛青 · 主色（首页入口卡边线同此） */
  --pri-deep:#123c40;
  --pri-soft:#e7f0ef;
  --pri-line:#c9dbd9;
  --ink:#232f31;
  --ink-soft:#5a6b6d;
  --bg:#f5f8f7;
  --card:#ffffff;
  --sand:#f3ede2;       /* 暖沙 · 经文引文底 */
  --sand-line:#e0d5bf;
  --shi:#a8592f;        /* 实 · 赭 */
  --xu:#48699c;         /* 虚 · 青蓝 */
  --mix:#7a6f4e;        /* 夹杂 · 苍金 */
  --back:#7a4a2b;       /* 平台悬浮返回钮规范色 */
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.75;font-size:16px}
h1,h2,.cite,.tagline,.bb-line,.tp-line{font-family:Georgia,"Songti SC","Noto Serif SC","STSong",serif}
a{color:var(--pri);text-decoration:none}

/* 顶栏 */
#topbar{position:sticky;top:0;z-index:100;background:var(--pri);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 16px;box-shadow:0 1px 6px rgba(18,60,64,.25)}
#topbar .logo{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:.5px}
#topbar .logo svg{display:block}
#topbar .sp{flex:1}
#topbar a.homelink{color:#dcebe9;font-size:14px}
#topbar button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:4px 12px;font-size:14px;cursor:pointer}
#installbtn{display:none}

#app{max-width:860px;margin:0 auto;padding:20px 16px 80px}

/* 首页 */
.hero{padding:26px 4px 8px}
.hero h1{font-size:26px;color:var(--pri-deep);letter-spacing:1px}
.tagline{margin-top:8px;color:var(--ink-soft);font-size:16px}
.searchbox{position:relative;margin:18px 0 6px}
#q{width:100%;padding:12px 16px;font-size:16px;border:1.5px solid var(--pri-line);border-radius:var(--radius);background:var(--card);color:var(--ink)}
#q:focus{outline:none;border-color:var(--pri)}
.qres{display:none;position:absolute;left:0;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--pri-line);border-radius:var(--radius);box-shadow:0 8px 28px rgba(18,60,64,.14);z-index:60;max-height:60vh;overflow:auto}
.qres.open{display:block}
.qr-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--pri-soft)}
.qr-item b{font-weight:600}
.qr-item.qr-off{color:var(--ink-soft)}
.qr-item.qr-off i,.chip-planned i{font-style:normal;font-size:11px;background:var(--pri-soft);color:var(--ink-soft);border-radius:6px;padding:1px 6px;margin-left:6px}
.qr-ft span{font-size:12px;color:var(--ink-soft)}
.qr-alias{padding:10px 14px;border-bottom:1px solid var(--pri-soft);background:var(--pri-soft)}
.qr-alias-h{font-size:12px;color:var(--pri-deep);font-weight:700;margin-bottom:4px}
.qr-none{padding:14px;color:var(--ink-soft)}

section h2{font-size:19px;color:var(--pri-deep);margin:26px 0 10px}
.hint{font-size:13px;color:var(--ink-soft);margin-top:6px}

/* 气机总图 */
.blocks{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:10px}
.block{background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:14px 8px;text-align:center;transition:border-color .15s}
.block:hover{border-color:var(--pri)}
.block-zh{display:block;font-size:20px;font-weight:700;color:var(--pri-deep);font-family:Georgia,"Songti SC","Noto Serif SC",serif}
.block-n{display:inline-block;margin-top:6px;font-size:12px;color:#fff;background:var(--pri);border-radius:10px;padding:0 8px}

/* 十纲 */
.cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.cat{background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:12px 14px;display:block}
.cat-on:hover{border-color:var(--pri)}
.cat-off{opacity:.55}
.cat-nm{display:block;font-weight:600}
.cat-ct{display:block;font-size:12px;color:var(--ink-soft);margin-top:2px}

/* 症状卡列表 */
.symcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:10px}
.symcard{background:var(--card);border:1.5px solid var(--pri-line);border-radius:var(--radius);padding:14px 16px;transition:border-color .15s,transform .15s}
.symcard:hover{border-color:var(--pri);transform:translateY(-2px)}
.symcard-nm{font-size:18px;font-weight:700;color:var(--pri-deep)}
.symcard-sub{font-size:12px;color:var(--ink-soft);margin:2px 0 8px}
.symcard-dirs{display:flex;flex-wrap:wrap;gap:6px}
.mini{font-size:12px;border-radius:8px;padding:2px 8px;background:var(--pri-soft);color:var(--ink)}
.mini.xs-shi{box-shadow:inset 3px 0 0 var(--shi)}
.mini.xs-xu{box-shadow:inset 3px 0 0 var(--xu)}
.mini.xs-mix{box-shadow:inset 3px 0 0 var(--mix)}

/* 推导器预告 */
.deriver{margin-top:28px;background:linear-gradient(135deg,var(--pri-deep),var(--pri));color:#eaf4f3;border-radius:var(--radius);padding:18px 20px}
.deriver h2{color:#fff;margin:0 0 6px}
.deriver p{font-size:14px;color:#cfe3e1}

.foot{margin-top:36px;text-align:center;font-size:12px;color:var(--ink-soft)}

/* 详情 */
.backlink{display:inline-block;margin:4px 0 12px;font-size:14px}
.detail .d-head h1{font-size:28px;color:var(--pri-deep)}
.aka{font-size:13px;color:var(--ink-soft);margin-top:4px}
.sec{margin-top:24px}
.sec h2{display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--pri-line);padding-bottom:6px}
.sec-n{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--pri);color:#fff;font-size:14px;font-family:inherit}
.what{background:var(--card);border:1px solid var(--pri-line);border-radius:var(--radius);padding:14px 16px}

/* 方向卡 + 推导链（signature） */
.dir{background:var(--card);border:1.5px solid var(--pri-line);border-left:5px solid var(--pri);border-radius:var(--radius);padding:14px 16px;margin-top:14px}
.dir-head{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.dir-label{font-weight:700;font-size:17px;color:var(--pri-deep)}
.wbadge{font-size:12px;border-radius:8px;padding:2px 9px;color:#fff;white-space:nowrap}
.wbadge.w3{background:var(--pri)}
.wbadge.w2{background:#5f8b87}
.wbadge.w1{background:#9db6b3}
.xsbadge{font-size:12px;border-radius:8px;padding:2px 9px;color:#fff;white-space:nowrap}
.xsbadge.xs-shi{background:var(--shi)}
.xsbadge.xs-xu{background:var(--xu)}
.xsbadge.xs-mix{background:var(--mix)}
.dir-tags{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px}
.dir-meta{font-size:12px;color:var(--ink-soft)}
.chip{display:inline-block;font-size:13px;border-radius:8px;padding:3px 10px;background:var(--pri-soft);color:var(--pri-deep);border:1px solid var(--pri-line)}
.chip-link:hover,.chip-tag:hover,.chip-xm:hover{border-color:var(--pri);background:#dcebe9}
.chip-planned{color:var(--ink-soft);border-style:dashed;cursor:default}
.chain{margin-top:12px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--pri-soft);border:1.5px solid var(--pri);color:var(--pri-deep);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:2px}
.step-t{flex:1}
.step-arrow{color:var(--pri);font-size:15px;margin:2px 0 2px 8px;line-height:1}
.cite{margin-top:12px;background:var(--sand);border:1px solid var(--sand-line);border-radius:8px;padding:10px 14px;font-size:14.5px;color:#4a4232}
.cite-l{display:inline-block;font-size:11px;color:#8a7a56;border:1px solid var(--sand-line);border-radius:6px;padding:0 6px;margin-right:8px;vertical-align:1px;font-family:-apple-system,sans-serif}

/* 虚实鉴别关卡 */
.bianbie{background:var(--card);border:1.5px solid var(--pri);border-radius:var(--radius);padding:14px 16px;margin-top:12px}
.bb-title{font-weight:700;color:var(--pri-deep);font-size:16px}
.bb-keyq{margin-top:8px;background:var(--pri-soft);border-radius:8px;padding:9px 12px;font-weight:600}
.bb-keyq span{display:inline-block;font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 7px;margin-right:8px;font-weight:400;vertical-align:1px}
.bb-rows{margin-top:10px;display:grid;gap:8px}
.bb-row{display:grid;grid-template-columns:150px 1fr;gap:10px;font-size:14.5px}
.bb-side{font-weight:700}
.bb-line{margin-top:10px;color:var(--pri-deep);border-top:1px dashed var(--pri-line);padding-top:9px;font-size:15px}
.note{margin-top:10px;background:var(--pri-soft);border-radius:8px;padding:9px 12px;font-size:14px}
.note span{font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 7px;margin-right:8px}

/* 伴随症状 */
.comp{margin-top:12px}
.comp-h{font-size:14px;color:var(--ink-soft);margin-bottom:6px}
.comp-chips{display:flex;flex-wrap:wrap;gap:7px}

/* 舌脉 */
.tp-table{display:grid;gap:8px;margin-top:8px}
.tp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;background:var(--card);border:1px solid var(--pri-line);border-radius:10px;padding:10px 12px;font-size:14.5px}
.tp-dir{font-weight:600;color:var(--pri-deep)}
.tp-tp b{display:inline-block;font-size:11px;color:#fff;background:var(--pri);border-radius:6px;padding:0 6px;margin-right:6px;font-weight:400}
.tp-line{margin-top:12px;color:var(--pri-deep);font-size:15px;border-left:3px solid var(--pri);padding-left:12px}

/* 跨模块 */
.xm{display:grid;gap:10px;margin-top:8px}
.xm-g{display:flex;align-items:center;flex-wrap:wrap;gap:7px}
.xm-l{font-size:12px;color:#fff;background:var(--pri);border-radius:6px;padding:1px 8px}

/* 反查 */
.taghits h1{font-size:22px;color:var(--pri-deep);margin-bottom:12px}
.block-tag{margin-top:18px}
.block-tag small{color:var(--ink-soft);font-weight:400}
.hit{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:var(--card);border:1px solid var(--pri-line);border-radius:10px;padding:10px 14px;margin-top:8px}
.hit:hover{border-color:var(--pri)}
.hit-sym{font-weight:700;color:var(--pri-deep)}
.hit-lbl{color:var(--ink-soft);font-size:14px}

/* 悬浮返回（平台规范） */
#floatback{position:fixed;right:20px;bottom:20px;z-index:9999;background:var(--back);color:#fff;border-radius:24px;padding:10px 18px;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.25)}

@media (max-width:520px){
  .bb-row{grid-template-columns:1fr}
  .tp-row{grid-template-columns:1fr}
  .hero h1{font-size:22px}
}
@media (prefers-reduced-motion:reduce){
  .symcard,.block{transition:none}
}
</style>
</head>

<script>
"use strict";
/* ============================================================
   SinoMed 症状学模块 · 数据层 v1
   受控词表 VOCAB / 证型别名 ALIASES / 全站症状总目 ROSTER / 十纲 CATS / 症状卡 SYMPTOMS
   规范：所有展示文本均为 {zh, en} 字段对；病机标签用受控词表枚举，禁止自由文字。
   ============================================================ */

const VOCAB = {
  tags: [
    "升不及","升太过","降不及","降太过",
    "出不及","出太过","入不及",
    "枢机不利·少阳","枢机不利·中焦",
    "通道受阻·痰","通道受阻·湿","通道受阻·瘀","通道受阻·食积",
    "气虚","血虚","阴虚","阳虚"
  ],
  tag_en: {
    "升不及": "Insufficient Ascent",
    "升太过": "Excessive Ascent",
    "降不及": "Insufficient Descent",
    "降太过": "Excessive Descent",
    "出不及": "Insufficient Exit (Outward Blocked)",
    "出太过": "Excessive Exit (Leakage)",
    "入不及": "Insufficient Entry (Failure to Store)",
    "枢机不利·少阳": "Pivot Dysfunction · Shaoyang",
    "枢机不利·中焦": "Pivot Dysfunction · Middle Jiao",
    "通道受阻·痰": "Pathway Obstruction · Phlegm",
    "通道受阻·湿": "Pathway Obstruction · Damp",
    "通道受阻·瘀": "Pathway Obstruction · Blood Stasis",
    "通道受阻·食积": "Pathway Obstruction · Food Stagnation",
    "气虚": "Qi Deficiency",
    "血虚": "Blood Deficiency",
    "阴虚": "Yin Deficiency",
    "阳虚": "Yang Deficiency"
  },
  loc: ["表","半表半里","上焦","中焦","下焦","全身"],
  loc_en: {
    "表": "Exterior",
    "半表半里": "Half-exterior, half-interior",
    "上焦": "Upper jiao",
    "中焦": "Middle jiao",
    "下焦": "Lower jiao",
    "全身": "Whole body"
  },
  xushi: ["虚","实","虚实夹杂"],
  xushi_en: { "虚": "Deficiency", "实": "Excess", "虚实夹杂": "Mixed deficiency–excess" },
  blocks: [
    { id: "sheng",  zh: "升",   en: "Ascent",   tags: ["升不及","升太过"] },
    { id: "jiang",  zh: "降",   en: "Descent",  tags: ["降不及","降太过"] },
    { id: "chu",    zh: "出",   en: "Exit",     tags: ["出不及","出太过"] },
    { id: "ru",     zh: "入",   en: "Entry",    tags: ["入不及"] },
    { id: "shuji",  zh: "枢机", en: "Pivot",    tags: ["枢机不利·少阳","枢机不利·中焦"] },
    { id: "tongdao",zh: "通道", en: "Pathways", tags: ["通道受阻·痰","通道受阻·湿","通道受阻·瘀","通道受阻·食积"] },
    { id: "huayuan",zh: "化源", en: "Source",   tags: ["气虚","血虚","阴虚","阳虚"] }
  ]
};

/* 证型 → 气机标签 模糊映射（宽进严出：前台查询宽，后台计分严） */
const ALIASES = [
  { zh: "肝气郁结", en: "Liver qi constraint", tags: ["出不及","枢机不利·少阳"] },
  { zh: "肝郁气滞", en: "Liver qi stagnation", tags: ["出不及","枢机不利·少阳"] },
  { zh: "肝郁",     en: "Liver constraint",    tags: ["出不及","枢机不利·少阳"] },
  { zh: "中气下陷", en: "Sinking of middle qi", tags: ["升不及","气虚"] },
  { zh: "脾虚",     en: "Spleen deficiency",   tags: ["气虚","升不及"] },
  { zh: "脾气虚",   en: "Spleen qi deficiency", tags: ["气虚","升不及"] },
  { zh: "心肾不交", en: "Heart–kidney non-interaction", tags: ["入不及","降不及"] },
  { zh: "痰湿中阻", en: "Phlegm-damp obstructing the middle", tags: ["通道受阻·痰","通道受阻·湿","枢机不利·中焦"] },
  { zh: "阴虚火旺", en: "Yin deficiency with effulgent fire", tags: ["阴虚","入不及"] },
  { zh: "卫表不固", en: "Unconsolidated defensive exterior", tags: ["气虚","出太过"] },
  { zh: "表虚不固", en: "Exterior deficiency, failing to secure", tags: ["气虚","出太过"] },
  { zh: "营卫不和", en: "Ying–wei disharmony", tags: ["出太过"] },
  { zh: "阳明腑实", en: "Yangming bowel excess", tags: ["降不及","通道受阻·食积"] },
  { zh: "少阳证",   en: "Shaoyang pattern",    tags: ["枢机不利·少阳"] },
  { zh: "少阳枢机不利", en: "Shaoyang pivot dysfunction", tags: ["枢机不利·少阳"] },
  { zh: "湿热内蕴", en: "Damp-heat brewing internally", tags: ["通道受阻·湿"] },
  { zh: "食积",     en: "Food stagnation",     tags: ["通道受阻·食积"] },
  { zh: "食积化热", en: "Food stagnation transforming into heat", tags: ["通道受阻·食积"] },
  { zh: "肾阳虚",   en: "Kidney yang deficiency", tags: ["阳虚"] },
  { zh: "肾阴虚",   en: "Kidney yin deficiency", tags: ["阴虚"] },
  { zh: "气虚发热", en: "Qi-deficiency fever", tags: ["气虚","升不及"] },
  { zh: "甘温除热", en: "Sweet-warm method to relieve heat", tags: ["气虚","升不及"] },
  { zh: "火郁",     en: "Constrained fire",    tags: ["出不及"] },
  { zh: "火郁发之", en: "Constrained fire — vent it", tags: ["出不及"] },
  { zh: "外感风寒", en: "Wind-cold invasion",  tags: ["出不及"] },
  { zh: "风寒束表", en: "Wind-cold fettering the exterior", tags: ["出不及"] },
  { zh: "里热炽盛", en: "Blazing interior heat", tags: ["降不及","升太过"] },
  { zh: "虚阳浮越", en: "Floating of deficient yang", tags: ["入不及","阳虚"] },
  { zh: "湿遏热伏", en: "Damp trapping latent heat", tags: ["通道受阻·湿"] },
  { zh: "血虚",     en: "Blood deficiency",    tags: ["血虚"] },
  { zh: "津亏",     en: "Fluid depletion",     tags: ["阴虚","血虚"] }
];

/* 全站症状总目（78 条）。built=true 者已上线；false 者显示"待上线"，供伴随症状引用与路线图展示。 */
const ROSTER = [
  /* 一、寒热汗液 */
  { id: "ehan",           zh: "恶寒",        en: "Aversion to Cold",            cat: "hanre",   built: true },
  { id: "fare",           zh: "发热",        en: "Fever",                       cat: "hanre",   built: true },
  { id: "hanre_wanglai",  zh: "寒热往来",    en: "Alternating Chills & Fever",  cat: "hanre",   built: true },
  { id: "chaore",         zh: "潮热",        en: "Tidal Fever",                 cat: "hanre",   built: true },
  { id: "zihan",          zh: "自汗",        en: "Spontaneous Sweating",        cat: "hanre",   built: true },
  { id: "daohan",         zh: "盗汗",        en: "Night Sweats",                cat: "hanre",   built: true },
  { id: "wuhan",          zh: "无汗",        en: "Absence of Sweating",         cat: "hanre",   built: true },

<script>
"use strict";
/* SinoMed 症状学模块 · 引擎层 v1 */
(function () {

  /* ============================================================

  var BUILD_MODE = true;

  var LKEY = "sinomed-lang";

  function getLang() {
    try { return localStorage.getItem(LKEY) || "en"; } catch (e) { return "en"; }
  }
  function setLang(l) {
    try { localStorage.setItem(LKEY, l); } catch (e) {}
    document.documentElement.setAttribute("data-lang", l);
    render();
  }
  function pick(o) {
    if (o == null) return "";
    if (typeof o === "string") return o;
    var l = getLang();
    return o[l] != null ? o[l] : (o.zh || "");
  }
  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  var UI = {
    zh: {
      title: "症状学 · 气机推导",

      map_title: "气机总图 · 按方向反查",

      cats_title: "十纲目录",
      built: "", planned: "筹备中", special_hint: "校准工具",
      count_unit: "症",

      deriver_title: "症状组合推导器",

      w3: "高概率", w2: "常见", w1: "少见",
      sec_what: "症状内涵", sec_derive: "气机推导", sec_inquiry: "问诊指南",
      sec_tp: "舌脉验证", sec_xm: "相关联动",
      bianbie: "虚实鉴别关卡", keyq: "关键一问",

      results: "搜索结果", noresult: "未找到，试试更短的关键词",

      block_title_post: " · 所辖方向",
      back_home: "返回目录", aka: "又名／含",
      dir_unit: "个方向",
      lang_btn: "EN",
      install: "安装应用",
      footer: "SinoMed 症状学 · 免费开放 · 内容按十纲持续扩充"
    },
    en: {
      title: "Symptoms · Qi-Dynamic Reasoning",
      tagline: "A symptom is testimony from the qi dynamic — derive the direction first, then verify it with tongue and pulse.",
      search_ph: "Search a symptom or pattern (e.g. night sweats, liver qi stagnation)",
      map_title: "Qi-Dynamic Map · Reverse Lookup",
      map_hint: "Tap any segment to list every symptom it can produce",
      cats_title: "Ten Categories",
      built: "", planned: "Coming", special_hint: "Calibration tool",
      count_unit: "",
      roadmap: "The module goes live category by category; Category 1, Chills, Fever & Sweat, is now open. Related symptoms not yet listed are folded into their principal symptom.",
      deriver_title: "Multi-Symptom Deriver",
      deriver_hint: "Select several symptoms and cross-derive the most probable qi-dynamic direction — opens in Phase 2; the data foundation is already in place.",
      w3: "High probability", w2: "Common", w1: "Less common",
      sec_what: "What It Is", sec_derive: "Qi-Dynamic Derivation", sec_inquiry: "Inquiry Guide",
      sec_tp: "Tongue & Pulse Verification", sec_xm: "Related Modules",
      bianbie: "Deficiency–Excess Checkpoint", keyq: "The One Key Question",
      companions: "High-probability companions of this mechanism",
      planned_badge: "Coming soon",
      note_label: "Differentiation note",
      tongue: "Tongue", pulse: "Pulse", cite_label: "Classical Source",
      xm_internal: "Internal Medicine", xm_points: "Points", xm_formulas: "Formulas",
      results: "Results", noresult: "Nothing found — try a shorter keyword",
      alias_hit: "Pattern → Qi-Dynamic Translation", alias_lead: "corresponds to these qi-dynamic states:",
      tag_hits_pre: "Symptoms derivable from “", tag_hits_post: "”",
      block_title_post: " · Directions",
      back_home: "Back to Contents", aka: "Also known as",
      dir_unit: " directions",
      lang_btn: "中文",
      install: "Install App",
      footer: "SinoMed Symptoms · Free & open · Expanding category by category"
    }
  };
  function t(k) { return (UI[getLang()] && UI[getLang()][k]) || k; }

  function tagName(tag) { return getLang() === "zh" ? tag : (VOCAB.tag_en[tag] || tag); }
  function locName(l) { return l ? (getLang() === "zh" ? l : (VOCAB.loc_en[l] || l)) : ""; }
  function xsName(x) { return getLang() === "zh" ? x : (VOCAB.xushi_en[x] || x); }
  function xsCls(x) { return x === "虚" ? "xs-xu" : (x === "实" ? "xs-shi" : "xs-mix"); }
  function wLabel(w) { return t("w" + w); }
  function wCls(w) { return "w" + w; }

  var ROSTER_MAP = {};
  ROSTER.forEach(function (r) { ROSTER_MAP[r.id] = r; });

  function symName(id) {
    var r = ROSTER_MAP[id];
    if (!r) return id;
    return getLang() === "zh" ? r.zh : r.en;
  }

  function pointLabel(p) {
    return getLang() === "zh" ? (p.code + "（" + p.zh + "）") : (p.code + " (" + p.py + ")");
  }

  /* ---------- 跨模块链接（相对路径 + from/back，规范：/{target}/?from&back#anchor） ---------- */
  function xmInternalUrl(id, sid) { return "../internal/?goto=" + encodeURIComponent(id) + "&from=symptoms&back=sym-" + encodeURIComponent(sid); }
  function xmPointUrl(code, sid) { return "../points/?goto=" + encodeURIComponent(code) + "&from=symptoms&back=sym-" + encodeURIComponent(sid); }
  function xmFormulaUrl(py, sid) { return "../formulas/?from=symptoms&back=sym-" + encodeURIComponent(sid) + "#f_" + encodeURIComponent(py); }

  /* ---------- 渲染：公共小件 ---------- */
  function companionChip(c) {
    var r = ROSTER_MAP[c.id];
    var nm = esc(symName(c.id));
    var note = c.note ? esc(pick(c.note)) : "";
    if (r && r.built) {
      return '<a class="chip chip-link" href="#sym-' + esc(c.id) + '" title="' + note + '">' + nm + '</a>';
    }
    return '<span class="chip chip-planned" title="' + note + '">' + nm + (BUILD_MODE ? '<i>' + esc(t("planned_badge")) + '</i>' : '') + '</span>';
  }

  function tagChip(tag) {
    return '<a class="chip chip-tag" href="#tag-' + encodeURIComponent(tag) + '">' + esc(tagName(tag)) + '</a>';
  }

  function dirCard(sym, d, compact) {
    var h = '<div class="dir" id="' + esc(sym.id + "-" + d.id) + '">';
    h += '<div class="dir-head">';
    h += '<span class="wbadge ' + wCls(d.weight) + '">' + esc(wLabel(d.weight)) + '</span>';
    h += '<span class="xsbadge ' + xsCls(d.xushi) + '">' + esc(xsName(d.xushi)) + '</span>';
    h += '<span class="dir-label">' + esc(pick(d.label)) + '</span>';
    h += '</div>';
    h += '<div class="dir-tags">';
    d.tags.forEach(function (tg) { h += tagChip(tg); });
    var meta = [];
    if (d.loc) meta.push(locName(d.loc));
    if (d.organ) meta.push(pick(d.organ));
    if (d.nature) meta.push(pick(d.nature));
    if (meta.length) h += '<span class="dir-meta">' + esc(meta.join(" · ")) + '</span>';
    h += '</div>';
    if (!compact) {
      h += '<div class="chain">';
      d.chain.forEach(function (st, i) {
        h += '<div class="step"><div class="step-n">' + (i + 1) + '</div><div class="step-t">' + esc(pick(st)) + '</div></div>';
        if (i < d.chain.length - 1) h += '<div class="step-arrow">↓</div>';
      });
      h += '</div>';
      if (d.cite) h += '<div class="cite"><span class="cite-l">' + esc(t("cite_label")) + '</span>' + esc(pick(d.cite)) + '</div>';
    }
    h += '</div>';
    return h;
  }

  /* ---------- 首页 ---------- */
  function tagHitCount(tag) {
    var n = 0;
    Object.keys(SYMPTOMS).forEach(function (k) {
      SYMPTOMS[k].dirs.forEach(function (d) { if (d.tags.indexOf(tag) >= 0) n++; });
    });
    return n;
  }

  function renderHome() {
    var h = '';
    h += '<section class="hero"><h1>' + esc(t("title")) + '</h1><p class="tagline">' + esc(t("tagline")) + '</p></section>';

    /* 搜索 */
    h += '<section class="searchbox"><input id="q" type="search" placeholder="' + esc(t("search_ph")) + '" autocomplete="off"><div id="qres" class="qres"></div></section>';

    /* 气机总图 */
    h += '<section class="mapsec"><h2>' + esc(t("map_title")) + '</h2><p class="hint">' + esc(t("map_hint")) + '</p><div class="blocks">';
    VOCAB.blocks.forEach(function (b) {
      var n = 0; b.tags.forEach(function (tg) { n += tagHitCount(tg); });
      h += '<a class="block" href="#block-' + b.id + '"><span class="block-zh">' + esc(getLang() === "zh" ? b.zh : b.en) + '</span><span class="block-n">' + n + '</span></a>';
    });
    h += '</div></section>';

    /* 十纲 */
    h += '<section class="catsec"><h2>' + esc(t("cats_title")) + '</h2><div class="cats">';
    CATS.forEach(function (c) {
      var items = ROSTER.filter(function (r) { return r.cat === c.id; });
      var builtN = items.filter(function (r) { return r.built; }).length;
      var nm = getLang() === "zh" ? c.zh : c.en;
      var ct = "";
      if (c.special) ct = BUILD_MODE ? (t("special_hint") + " · " + t("planned")) : t("special_hint");
      else if (builtN > 0) ct = items.length + t("count_unit");
      else ct = BUILD_MODE ? (items.length + t("count_unit") + " · " + t("planned")) : (items.length + t("count_unit"));
      if (!c.special && builtN > 0) {
        h += '<a class="cat cat-on" href="#cat-' + c.id + '"><span class="cat-nm">' + esc(nm) + '</span><span class="cat-ct">' + esc(ct) + '</span></a>';
      } else {
        h += '<div class="cat cat-off"><span class="cat-nm">' + esc(nm) + '</span><span class="cat-ct">' + esc(ct) + '</span></div>';
      }
    });
    h += '</div>';
    if (BUILD_MODE) h += '<p class="hint">' + esc(t("roadmap")) + '</p>';
    h += '</section>';

    /* 推导器预告 */
    if (BUILD_MODE) h += '<section class="deriver"><h2>' + esc(t("deriver_title")) + '</h2><p>' + esc(t("deriver_hint")) + '</p></section>';

    h += '<footer class="foot">' + esc(t("footer")) + '</footer>';
    return h;
  }

  function renderCatList(catId, embedded) {
    var cat = null;
    CATS.forEach(function (c) { if (c.id === catId) cat = c; });
    if (!cat) return "";
    var h = '<section class="symlist" id="cat-' + esc(catId) + '">';
    h += '<h2>' + esc(getLang() === "zh" ? cat.zh : cat.en) + '</h2><div class="symcards">';
    ROSTER.filter(function (r) { return r.cat === catId && r.built; }).forEach(function (r) {
      var s = SYMPTOMS[r.id];
      if (!s) return;
      var dirsBrief = s.dirs.map(function (d) {
        return '<span class="mini ' + xsCls(d.xushi) + '">' + esc(pick(d.label)) + '</span>';
      }).join("");
      h += '<a class="symcard" href="#sym-' + esc(r.id) + '">';
      h += '<div class="symcard-nm">' + esc(getLang() === "zh" ? r.zh : r.en) + '</div>';
      h += '<div class="symcard-sub">' + s.dirs.length + esc(getLang() === "zh" ? " " + t("dir_unit") : t("dir_unit")) + '</div>';
      h += '<div class="symcard-dirs">' + dirsBrief + '</div>';
      h += '</a>';
    });
    h += '</div></section>';
    if (!embedded) h = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>' + h;
    return h;
  }

  /* ---------- 症状详情（五段式） ---------- */
  function renderSym(id) {
    var s = SYMPTOMS[id];
    if (!s) return renderHome();
    var h = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>';
    h += '<article class="detail" id="sym-' + esc(id) + '">';
    h += '<header class="d-head"><h1>' + esc(pick(s.name)) + '</h1>';
    if (s.aka) {
      var akas = getLang() === "zh" ? s.aka.zh : s.aka.en;
      h += '<p class="aka">' + esc(t("aka")) + '：' + esc(akas.join(" · ")) + '</p>';
    }
    h += '</header>';

    /* 1 症状内涵 */
    h += '<section class="sec"><h2><span class="sec-n">1</span>' + esc(t("sec_what")) + '</h2><p class="what">' + esc(pick(s.what)) + '</p></section>';

    /* 2 气机推导 */
    h += '<section class="sec"><h2><span class="sec-n">2</span>' + esc(t("sec_derive")) + '</h2>';
    s.dirs.forEach(function (d) { h += dirCard(s, d, false); });
    h += '</section>';

    /* 3 问诊指南 */
    h += '<section class="sec"><h2><span class="sec-n">3</span>' + esc(t("sec_inquiry")) + '</h2>';
    if (s.bianbie) {
      h += '<div class="bianbie"><div class="bb-title">&#9878; ' + esc(t("bianbie")) + '</div>';
      h += '<div class="bb-keyq"><span>' + esc(t("keyq")) + '</span>' + esc(pick(s.bianbie.key)) + '</div>';
      h += '<div class="bb-rows">';
      s.bianbie.rows.forEach(function (r) {
        h += '<div class="bb-row"><div class="bb-side">' + esc(pick(r.side)) + '</div><div class="bb-feats">' + esc(pick(r.feats)) + '</div></div>';
      });
      h += '</div><div class="bb-line">' + esc(pick(s.bianbie.line)) + '</div></div>';
    }
    if (s.note) h += '<div class="note"><span>' + esc(t("note_label")) + '</span>' + esc(pick(s.note)) + '</div>';
    s.dirs.forEach(function (d) {
      if (!d.companions || !d.companions.length) return;
      h += '<div class="comp"><div class="comp-h"><span class="wbadge ' + wCls(d.weight) + '">' + esc(wLabel(d.weight)) + '</span> ' + esc(pick(d.label)) + ' — ' + esc(t("companions")) + '</div><div class="comp-chips">';
      d.companions.forEach(function (c) { h += companionChip(c); });
      h += '</div></div>';
    });
    h += '</section>';

    /* 4 舌脉验证 */
    h += '<section class="sec"><h2><span class="sec-n">4</span>' + esc(t("sec_tp")) + '</h2><div class="tp-table">';
    s.dirs.forEach(function (d) {
      h += '<div class="tp-row"><div class="tp-dir">' + esc(pick(d.label)) + '</div><div class="tp-tp"><b>' + esc(t("tongue")) + '</b>' + esc(pick(d.tongue)) + '</div><div class="tp-tp"><b>' + esc(t("pulse")) + '</b>' + esc(pick(d.pulse)) + '</div></div>';
    });
    h += '</div></section>';

    /* 5 相关联动 */
    var xm = s.xm || {};
    var hasXm = (xm.internal && xm.internal.length) || (xm.points && xm.points.length) || (xm.formulas && xm.formulas.length);
    if (hasXm) {
      h += '<section class="sec"><h2><span class="sec-n">5</span>' + esc(t("sec_xm")) + '</h2><div class="xm">';
      if (xm.internal && xm.internal.length) {
        h += '<div class="xm-g"><span class="xm-l">' + esc(t("xm_internal")) + '</span>';
        xm.internal.forEach(function (it) {
          h += '<a class="chip chip-xm" href="' + xmInternalUrl(it.id, s.id) + '">' + esc(getLang() === "zh" ? it.zh : it.en) + '</a>';
        });
        h += '</div>';
      }
      if (xm.points && xm.points.length) {
        h += '<div class="xm-g"><span class="xm-l">' + esc(t("xm_points")) + '</span>';
        xm.points.forEach(function (p) {
          h += '<a class="chip chip-xm" href="' + xmPointUrl(p.code, s.id) + '">' + esc(pointLabel(p)) + '</a>';
        });
        h += '</div>';
      }
      if (xm.formulas && xm.formulas.length) {
        h += '<div class="xm-g"><span class="xm-l">' + esc(t("xm_formulas")) + '</span>';
        xm.formulas.forEach(function (f) {
          h += '<a class="chip chip-xm" href="' + xmFormulaUrl(f.py, s.id) + '">' + esc(getLang() === "zh" ? f.zh : f.en) + '</a>';
        });
        h += '</div>';
      }
      h += '</div></section>';
    }

    h += '</article>';
    return h;
  }

  /* ---------- 标签／区块反查 ---------- */
  function tagHits(tag) {
    var hits = [];
    Object.keys(SYMPTOMS).forEach(function (k) {
      SYMPTOMS[k].dirs.forEach(function (d) {
        if (d.tags.indexOf(tag) >= 0) hits.push({ sym: SYMPTOMS[k], dir: d });
      });
    });
    hits.sort(function (a, b) { return b.dir.weight - a.dir.weight; });
    return hits;
  }

  function renderTag(tag) {
    var hits = tagHits(tag);
    var h = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>';
    h += '<section class="taghits"><h1>' + esc(t("tag_hits_pre")) + esc(tagName(tag)) + esc(t("tag_hits_post")) + '</h1>';
    if (!hits.length) h += '<p class="hint">' + esc(t("noresult")) + '</p>';
    hits.forEach(function (x) {
      h += '<a class="hit" href="#sym-' + esc(x.sym.id) + '">';
      h += '<span class="hit-sym">' + esc(pick(x.sym.name)) + '</span>';
      h += '<span class="wbadge ' + wCls(x.dir.weight) + '">' + esc(wLabel(x.dir.weight)) + '</span>';
      h += '<span class="xsbadge ' + xsCls(x.dir.xushi) + '">' + esc(xsName(x.dir.xushi)) + '</span>';
      h += '<span class="hit-lbl">' + esc(pick(x.dir.label)) + '</span>';
      h += '</a>';
    });
    h += '</section>';
    return h;
  }

  function renderBlock(bid) {
    var b = null;
    VOCAB.blocks.forEach(function (x) { if (x.id === bid) b = x; });
    if (!b) return renderHome();
    var h = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>';
    h += '<section class="taghits"><h1>' + esc(getLang() === "zh" ? b.zh : b.en) + esc(t("block_title_post")) + '</h1>';
    b.tags.forEach(function (tg) {
      var hits = tagHits(tg);
      h += '<h2 class="block-tag">' + esc(tagName(tg)) + ' <small>' + hits.length + '</small></h2>';
      hits.forEach(function (x) {
        h += '<a class="hit" href="#sym-' + esc(x.sym.id) + '">';
        h += '<span class="hit-sym">' + esc(pick(x.sym.name)) + '</span>';
        h += '<span class="wbadge ' + wCls(x.dir.weight) + '">' + esc(wLabel(x.dir.weight)) + '</span>';
        h += '<span class="xsbadge ' + xsCls(x.dir.xushi) + '">' + esc(xsName(x.dir.xushi)) + '</span>';
        h += '<span class="hit-lbl">' + esc(pick(x.dir.label)) + '</span>';
        h += '</a>';
      });
    });
    h += '</section>';
    return h;
  }

  /* ---------- 搜索 ---------- */
  function doSearch(q) {
    q = q.trim();
    var box = document.getElementById("qres");
    if (!box) return;
    if (!q) { box.innerHTML = ""; box.classList.remove("open"); return; }
    var lq = q.toLowerCase();
    var h = "";
    var found = false;

    /* 证型别名 */
    ALIASES.forEach(function (a) {
      if (a.zh.indexOf(q) >= 0 || a.en.toLowerCase().indexOf(lq) >= 0) {
        found = true;
        h += '<div class="qr-alias"><div class="qr-alias-h">' + esc(t("alias_hit")) + '</div>';
        h += '<div class="qr-alias-b"><b>' + esc(getLang() === "zh" ? a.zh : a.en) + '</b> ' + esc(t("alias_lead")) + ' ';
        a.tags.forEach(function (tg) { h += tagChip(tg); });
        h += '</div></div>';
      }
    });

    /* 症状名（含未上线，未上线者显示徽标） */
    ROSTER.forEach(function (r) {
      var s = SYMPTOMS[r.id];
      var akaHit = false;
      if (s && s.aka) {
        (s.aka.zh || []).forEach(function (x) { if (x.indexOf(q) >= 0) akaHit = true; });
        (s.aka.en || []).forEach(function (x) { if (x.toLowerCase().indexOf(lq) >= 0) akaHit = true; });
      }
      if (r.zh.indexOf(q) >= 0 || r.en.toLowerCase().indexOf(lq) >= 0 || r.id.indexOf(lq) >= 0 || akaHit) {
        found = true;
        if (r.built) {
          h += '<a class="qr-item" href="#sym-' + esc(r.id) + '"><b>' + esc(symName(r.id)) + '</b></a>';
        } else {
          h += '<div class="qr-item qr-off"><b>' + esc(symName(r.id)) + '</b>' + (BUILD_MODE ? '<i>' + esc(t("planned_badge")) + '</i>' : '') + '</div>';
        }
      }
    });

    /* 全文（推导链、内涵段） */
    var ftHits = [];
    Object.keys(SYMPTOMS).forEach(function (k) {
      var s = SYMPTOMS[k];
      var blob = pick(s.what);
      s.dirs.forEach(function (d) {
        blob += " " + pick(d.label);
        d.chain.forEach(function (st) { blob += " " + pick(st); });
      });
      if (blob.toLowerCase().indexOf(lq) >= 0 && !(s.name.zh.indexOf(q) >= 0 || s.name.en.toLowerCase().indexOf(lq) >= 0)) {
        ftHits.push(s);
      }
    });
    ftHits.forEach(function (s) {
      found = true;
      h += '<a class="qr-item qr-ft" href="#sym-' + esc(s.id) + '"><b>' + esc(pick(s.name)) + '</b><span>…' + esc(getLang() === "zh" ? "全文命中" : "full-text match") + '</span></a>';
    });

    if (!found) h = '<div class="qr-none">' + esc(t("noresult")) + '</div>';
    box.innerHTML = h;
    box.classList.add("open");
  }

  /* ---------- 路由 ---------- */
  function render() {
    var app = document.getElementById("app");
    if (!app) return;
    var hash = decodeURIComponent(location.hash || "").replace(/^#/, "");
    var html;
    if (hash.indexOf("sym-") === 0) html = renderSym(hash.slice(4));
    else if (hash.indexOf("tag-") === 0) html = renderTag(hash.slice(4));
    else if (hash.indexOf("block-") === 0) html = renderBlock(hash.slice(6));
    else if (hash.indexOf("cat-") === 0) html = '<a class="backlink" href="#">&larr; ' + esc(t("back_home")) + '</a>' + renderCatList(hash.slice(4), true);
    else html = renderHome();
    app.innerHTML = html;
    var q = document.getElementById("q");
    if (q) q.addEventListener("input", function () { doSearch(q.value); });
    var lb = document.getElementById("langbtn");
    if (lb) lb.textContent = t("lang_btn");
    window.scrollTo(0, 0);
  }

  /* ---------- 启动 ---------- */
  function boot() {
    document.documentElement.setAttribute("data-lang", getLang());

    /* 入站 ?goto= */
    var p = new URLSearchParams(location.search);
    var g = p.get("goto");
    if (g && !location.hash) {
      var gid = g.replace(/[^a-z0-9_-]/gi, "");
      if (ROSTER_MAP[gid]) location.hash = "#sym-" + gid;
    }

    /* 悬浮返回按钮（规范：仅 from 存在时显示，#7a4a2b） */
    var from = p.get("from");
    if (from && /^[a-z0-9_-]+$/i.test(from)) {
      var back = p.get("back") || "";
      back = back.replace(/[^a-zA-Z0-9_\-]/g, "");
      var a = document.createElement("a");
      a.id = "floatback";
      a.href = "../" + from + "/" + (back ? "#" + back : "");
      a.innerHTML = getLang() === "zh" ? "&larr; 返回" : "&larr; Back";
      document.body.appendChild(a);
    }

    /* 语言切换 */
    var lb = document.getElementById("langbtn");
    if (lb) lb.addEventListener("click", function () { setLang(getLang() === "zh" ? "en" : "zh"); });

    /* PWA */
    if ("serviceWorker" in navigator && location.protocol === "https:") {
      navigator.serviceWorker.register("./sw.js").catch(function () {});
    }
    var deferred = null;
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      deferred = e;
      var b = document.getElementById("installbtn");
      if (b) {
        b.style.display = "inline-block";
        b.textContent = t("install");
        b.onclick = function () { if (deferred) { deferred.prompt(); deferred = null; b.style.display = "none"; } };
      }
    });

    window.addEventListener("hashchange", render);
    render();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();

})();

</script>
</body>
</html>
